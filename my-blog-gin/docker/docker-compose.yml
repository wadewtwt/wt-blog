version: '3.8'

services:
  # 1. PostgreSQL 数据库服务
  db:
    image: registry.cn-shanghai.aliyuncs.com/wt-pro/postgresql:v1
    container_name: my_local_pg
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: my-blog
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d my-blog"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Go 后端服务
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: blog-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_NAME=my-blog
    depends_on:
      db:
        condition: service_healthy  # 关键：确保 db 的健康检查通过后再启动 app
